<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Everfair</title>
  <link rel="icon" type="image/png" href="everfair.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2.5rem;
      padding: 2rem;
    }

    .logo {
      width: clamp(180px, 32vw, 300px);
      height: auto;
      opacity: 0;
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .wordmark {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: clamp(2.1rem, 5.5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #111111;
      padding-left: 0.14em; /* optical centering for the letter-spacing */
      opacity: 0;
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .wordmark { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="logo" src="everfair.png" alt="Everfair">
  <h1 class="wordmark">Everfair</h1>
</body>
</html>
